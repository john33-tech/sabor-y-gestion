# ---------------------------------------------------------------------------
# Secret: valores sensibles. Estos son los de DESARROLLO (los mismos que ya
# están en docker-compose.yml, por lo que no agregan riesgo nuevo en local).
#
# ⚠️  PRODUCCIÓN: NO uses estos valores. En el overlay cloud reemplazalos por
#     secretos reales y NO los subas a git. Generá un APP_KEY nuevo con:
#         php artisan key:generate --show
#
# Usamos stringData (texto plano) en vez de data (base64) para que sea legible.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: sabor-secret
type: Opaque
stringData:
  APP_KEY: "base64:13WyO9LOsN9jWGWsE9g2H0dvi6dltn0DrSBh0UMSA1o="
  DB_PASSWORD: "sabor_secret"
  REVERB_APP_SECRET: "saborsecret"
  RESEND_API_KEY: ""
  # --- Consumidos por el contenedor de MySQL ---
  MYSQL_PASSWORD: "sabor_secret"
  MYSQL_ROOT_PASSWORD: "root_secret"
