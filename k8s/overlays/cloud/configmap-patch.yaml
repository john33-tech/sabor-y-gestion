# Producción: apaga debug, activa modo production (caches optimizadas en el
# entrypoint) y apunta APP_URL a tu dominio real.
# Dominio: sabor-y-gestion.com
apiVersion: v1
kind: ConfigMap
metadata:
  name: sabor-config
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://sabor-y-gestion.com"
  LOG_LEVEL: "warning"
  # Solo en el PRIMER deploy poné "true" para cargar datos de ejemplo; luego "false".
  RUN_SEEDERS: "false"
