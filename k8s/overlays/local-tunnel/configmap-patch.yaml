# Cluster LOCAL (Docker Desktop) expuesto a internet por un TUNEL (Cloudflare /
# LocalTunnel) sobre el dominio propio. Conectado a TiDB Cloud (BD compartida).
# APP_ENV=production -> forceScheme(https) (el tunel sirve https); broadcasting
# por Pusher Cloud (externo, funciona a traves del tunel). NO migra/seedea.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sabor-config
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://sabor-y-gestion.com"
  LOG_LEVEL: "warning"

  # --- Base de datos: TiDB Cloud (grupo) ---
  DB_CONNECTION: "mysql"
  DB_HOST: "gateway01.us-east-1.prod.aws.tidbcloud.com"
  DB_PORT: "4000"
  DB_DATABASE: "saborgestion"
  DB_USERNAME: "3Z76JHETThLiUEQ.root"
  DB_SSL_CA: "/etc/ssl/tidb/isrgrootx1.pem"
  DB_SSL_VERIFY: "false"

  # --- No tocar la BD del grupo en el arranque ---
  RUN_MIGRATIONS: "false"
  RUN_SEEDERS: "false"

  # --- Perf: sacar sesión y caché de TiDB (cada round-trip a us-east-1 ~150ms).
  #     cookie = sesión en cookie cifrada (no toca BD, sirve con múltiples réplicas).
  #     file   = caché local en el pod (no toca BD).
  SESSION_DRIVER: "cookie"
  CACHE_STORE: "file"

  MAIL_MAILER: "log"

  # --- Tiempo real con Pusher Cloud (el APP_SECRET va en el Secret) ---
  BROADCAST_CONNECTION: "pusher"
  PUSHER_APP_ID: "2150075"
  PUSHER_APP_KEY: "a42d53009b7b282bc22d"
  PUSHER_APP_CLUSTER: "us2"
  PUSHER_HOST: ""
  PUSHER_PORT: "443"
  PUSHER_SCHEME: "https"
