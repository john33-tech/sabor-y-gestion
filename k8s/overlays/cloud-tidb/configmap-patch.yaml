# AKS conectado a TiDB Cloud (la BD compartida del grupo).
# NO corre migraciones/seeders (la BD del grupo ya está migrada).
apiVersion: v1
kind: ConfigMap
metadata:
  name: sabor-config
data:
  # APP_ENV != production para no forzar https sin dominio/TLS (demo por IP).
  APP_ENV: "local"
  APP_DEBUG: "false"
  APP_URL: "http://CAMBIAR-POR-IP-PUBLICA"
  # URL base del QR de pago: apunta a /pago-externo de ESTA app (no a un sitio
  # externo), para que el cliente escanee, pague y confirme en este servidor.
  APP_URL_QR: "http://CAMBIAR-POR-IP-PUBLICA"
  LOG_LEVEL: "warning"

  DB_CONNECTION: "mysql"
  DB_HOST: "gateway01.us-east-1.prod.aws.tidbcloud.com"
  DB_PORT: "4000"
  DB_DATABASE: "saborgestion"
  DB_USERNAME: "3Z76JHETThLiUEQ.root"
  DB_SSL_CA: "/etc/ssl/tidb/isrgrootx1.pem"
  DB_SSL_VERIFY: "false"

  RUN_MIGRATIONS: "false"
  RUN_SEEDERS: "false"

  MAIL_MAILER: "log"

  # Tiempo real con PUSHER CLOUD (el APP_SECRET va en el Secret, no aquí).
  BROADCAST_CONNECTION: "pusher"
  PUSHER_APP_ID: "2150075"
  PUSHER_APP_KEY: "a42d53009b7b282bc22d"
  PUSHER_APP_CLUSTER: "us2"
  PUSHER_HOST: ""
  PUSHER_PORT: "443"
  PUSHER_SCHEME: "https"
