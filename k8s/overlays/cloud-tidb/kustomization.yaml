# ---------------------------------------------------------------------------
# Overlay CLOUD-TIDB: despliega en AKS (u otro cluster real) conectado a
# TiDB Cloud (la BD del grupo). Sin MySQL en el cluster, sin Ingress
# (LoadBalancer público), imagen desde GHCR. Ver RUNBOOK-AKS.md.
# ---------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# CA público de TiDB Cloud (Let's Encrypt ISRG Root X1) montado en el pod.
configMapGenerator:
  - name: tidb-ca
    files:
      - isrgrootx1.pem
generatorOptions:
  disableNameSuffixHash: true

patches:
  - path: configmap-patch.yaml
  - path: deployment-patch.yaml
  # Quitar el Secret de dev del base: en AKS lo creas tú con `kubectl create
  # secret` (password REAL de TiDB), y así `apply -k` no lo pisa.
  - target:
      kind: Secret
      name: sabor-secret
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: sabor-secret
  # Exponer la app con LoadBalancer público
  - target:
      kind: Service
      name: app
    patch: |
      - op: replace
        path: /spec/type
        value: LoadBalancer
  # Quitar MySQL del cluster (usamos TiDB Cloud)
  - target:
      kind: StatefulSet
      name: mysql
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: mysql
  - target:
      kind: Service
      name: mysql
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: mysql
  # Quitar Ingress (demo por IP del LoadBalancer)
  - target:
      kind: Ingress
      name: sabor-ingress
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: sabor-ingress

images:
  - name: sabor-gestion
    newName: ghcr.io/john33-tech/sabor-gestion
    newTag: latest
