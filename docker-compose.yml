# ---------------------------------------------------------------------------
# Sabor & Gestión — docker-compose para desarrollo / demo local
# Levanta la app Laravel + MySQL en tu compu con un solo comando:
#     docker compose up --build
# Luego abrí http://localhost:8080
# ---------------------------------------------------------------------------

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sabor-gestion:latest
    container_name: sabor-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_NAME: "Sabor & Gestion"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_KEY: ${APP_KEY}

      LOG_CHANNEL: stack
      LOG_LEVEL: debug

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: saborGestion
      DB_USERNAME: sabor
      DB_PASSWORD: sabor_secret

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local

      # Broadcasting / WebSockets — Reverb interno (Apache proxy a 8081)
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: sabor-app-id
      REVERB_APP_KEY: saborkey
      REVERB_APP_SECRET: saborsecret
      REVERB_HOST: localhost
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8081
      VITE_REVERB_APP_KEY: saborkey
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: 8080
      VITE_REVERB_SCHEME: http

      # Mailtrap SMTP local (en Railway usamos transport HTTP por SMTP bloqueado)
      MAIL_MAILER: smtp
      MAIL_HOST: sandbox.smtp.mailtrap.io
      MAIL_PORT: 2525
      MAIL_USERNAME: b2c148acac972f
      MAIL_PASSWORD: 608b289c8d5999
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: no-reply@saborgestion.com
      MAIL_FROM_NAME: "Sabor Gestion"

      RUN_MIGRATIONS: "true"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs

  mysql:
    image: mysql:8.0
    container_name: sabor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: saborGestion
      MYSQL_USER: sabor
      MYSQL_PASSWORD: sabor_secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
  app_storage:
  app_logs:
