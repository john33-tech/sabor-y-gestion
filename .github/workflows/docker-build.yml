# ---------------------------------------------------------------------------
# CI/CD: construye la imagen Docker en los runners de GitHub (red rápida) y la
# publica en GHCR (GitHub Container Registry). Así NO subís 1.1 GB desde tu PC.
#
# La imagen queda en: ghcr.io/<owner>/sabor-gestion:latest  (+ tag por commit)
# El cluster de la nube la baja desde ahí (kubectl apply -k k8s/overlays/cloud).
#
# Se dispara al hacer push a main, o manualmente desde la pestaña Actions.
# ---------------------------------------------------------------------------
name: Build & Push image to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:        # botón "Run workflow" en la pestaña Actions

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sabor-gestion

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # necesario para publicar en GHCR

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # token automático, no hay que crear nada

      - name: Metadatos (nombre + tags de la imagen)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Pusher cloud para el tiempo real (la KEY es pública: va en el JS del
          # cliente, no es secreto; el SECRET sí va solo en el backend/Secret K8s).
          build-args: |
            VITE_PUSHER_APP_KEY=a42d53009b7b282bc22d
            VITE_PUSHER_APP_CLUSTER=us2

      # Auto-deploy en Render: al terminar de publicar la imagen :latest, avisa
      # a Render para que recargue (re-pull de :latest). Requiere el secret
      # RENDER_DEPLOY_HOOK (Settings > Secrets > Actions). Si no está, se saltea.
      - name: Disparar deploy en Render
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_HOOK" ]; then
            curl -fsS -X POST "$RENDER_HOOK" && echo "✅ Deploy en Render disparado"
          else
            echo "ℹ️ RENDER_DEPLOY_HOOK no configurado — se omite el auto-deploy."
          fi
